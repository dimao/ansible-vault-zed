name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build (cross)
        if: ${{ matrix.cross }}
        working-directory: ansible-vault-lsp
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        working-directory: ansible-vault-lsp
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        working-directory: ansible-vault-lsp
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ansible-vault-lsp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ansible-vault-lsp

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        working-directory: ansible-vault-lsp
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ansible-vault-lsp.exe -DestinationPath "ansible-vault-lsp-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ansible-vault-lsp/target/${{ matrix.target }}/release/ansible-vault-lsp-*.tar.gz
            ansible-vault-lsp/target/${{ matrix.target }}/release/ansible-vault-lsp-*.zip

  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: ansible-vault-lsp
        run: cargo test
